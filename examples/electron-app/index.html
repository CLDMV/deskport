<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'" />
		<title>Deskport Example</title>
		<style>
			html,
			body {
				height: 100%;
				margin: 0;
			}
			body {
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 0.5rem;
				font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
				background: #1e1e1e;
				color: #e0e0e0;
			}
			h1 {
				margin: 0;
				font-size: 1.6rem;
			}
			.muted {
				color: #8aa86a;
				font-size: 0.9rem;
			}
			code {
				background: #2d2d2d;
				padding: 0.1rem 0.35rem;
				border-radius: 4px;
			}
		</style>
	</head>
	<body>
		<h1>🚀 Deskport Example</h1>
		<p class="muted">If you can see this window, Remote Dev Launcher launched the target.</p>
		<p>Loaded at <code id="time"></code></p>
		<p class="muted" id="platform"></p>
		<script>
			document.getElementById("time").textContent = new Date().toLocaleTimeString();
			document.getElementById("platform").textContent =
				"Electron " + process.versions.electron + " · Node " + process.versions.node + " · " + process.platform;
		</script>
	</body>
</html>
